name: Deploy to Production

on:
  workflow_dispatch:

jobs:
  check-ci:
    name: Verify CI Checks
    runs-on: ubuntu-latest
    permissions:
      checks: read
      contents: read
    steps:
      - name: Check lint and test status
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const { data: { check_runs } } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
            });

            const required = ['ESLint', 'Unit Tests'];
            for (const name of required) {
              const run = check_runs.find(r => r.name === name && r.conclusion === 'success');
              if (!run) {
                core.setFailed(`Required check "${name}" has not passed on this commit`);
              }
            }

  deploy:
    needs: check-ci
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  #v6.0.2

      - name: Install Heroku CLI
        run: |
          curl https://cli-assets.heroku.com/install.sh | sh

      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@1b080913896a5d6d44a18e9e208f8eb1fee9b0f7  #v3.15.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}

      - name: Send Pushover Notification
        uses: umahmood/pushover-actions@5da31193f672e7418804bdb51836bdf20f393c8f  # v1.1.0
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
        with:
          title: Changes deployed to Canes Bingo
          status: ${{ job.status }}
          url: 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          url_title: View workflow